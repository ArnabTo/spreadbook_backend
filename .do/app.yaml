name: apibiz
services:
  - name: web
    environment_slug: python
    github:
      # When you connect the GitHub repo in DigitalOcean UI, this will be filled/managed there.
      # Keeping a spec file in repo makes the configuration reproducible.
      branch: main
      deploy_on_push: true
    source_dir: /
    http_port: 8080
    run_command: >-
      bash -lc "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn ERP_Shop.wsgi:application --bind 0.0.0.0:${PORT:-8080} --workers 2 --threads 4 --timeout 120"
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "apibiz.hellobiz.net"
      - key: DJANGO_USE_X_FORWARDED_PROTO
        value: "1"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "1"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "1"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "1"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://apibiz.hellobiz.net"
      - key: DJANGO_CORS_ALLOW_ALL
        value: "0"
      # Set DJANGO_CORS_ALLOWED_ORIGINS after frontend domain is finalized.
      # - key: DJANGO_CORS_ALLOWED_ORIGINS
      #   value: "https://your-frontend-domain"
      - key: DJOSER_DOMAIN
        value: "apibiz.hellobiz.net"
      - key: DJANGO_SECRET_KEY
        type: SECRET
        value: "REPLACE_IN_DO_UI"
      # Recommended: configure Postgres via DATABASE_URL in DO UI.
      # - key: DATABASE_URL
      #   type: SECRET
      #   value: "postgresql://..."
